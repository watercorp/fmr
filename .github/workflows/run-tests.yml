name: Run Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]

jobs:
  run-tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine Go Version
        id: go-version
        run: |
          goMod=$(cat go.mod)
          goVersionRegex="go (1\.[0-9\.]+)"
          if [[ $goMod =~ $goVersionRegex ]]; then
            goVersion="${BASH_REMATCH[1]}"
            echo "Go version found in go.mod: $goVersion"
            echo "go-version=$goVersion" >> $GITHUB_OUTPUT
          else
              echo "Go version not found in go.mod"
              exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ steps.go-version.outputs.go-version }}

      - name: Run Tests
        run: go test -v ./...