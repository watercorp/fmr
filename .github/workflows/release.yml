name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.WATERCORP_DEPLOY_APPID }}
          private-key: ${{ secrets.WATERCORP_DEPLOY_SECRET }}
          owner: ${{ github.repository_owner }}
          repositories: |
            homebrew-tap

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine Go Version
        id: go-version
        run: |
          goMod=$(cat go.mod)
          goVersionRegex="go (1\.[0-9\.]+)"
          if [[ $goMod =~ $goVersionRegex ]]; then
            goVersion="${BASH_REMATCH[1]}"
            echo "Go version found in go.mod: $goVersion"
            echo "go-version=$goVersion" >> $GITHUB_OUTPUT
          else
              echo "Go version not found in go.mod"
              exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go-version.outputs.go-version }}

      - name: Run Tests
        run: go test -v ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v6
        with:
          repository: 'watercorp/homebrew-tap'
          token: ${{ steps.app-token.outputs.token }}
          path: 'homebrew-tap'

      - name: Update Homebrew Tap
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          ARCHIVE_URL="https://github.com/watercorp/fmr/archive/refs/tags/${TAG_NAME}.tar.gz"

          # Download the archive and calculate the checksum
          wget $ARCHIVE_URL
          CHECKSUM=$(sha256sum "${TAG_NAME}.tar.gz" | awk '{print $1}')

          # Update the replacements
          sed -i "s|REPLACE_ARCHIVE_URL|${ARCHIVE_URL}|g" fmr-homebrew-template.rb
          sed -i "s/REPLACE_CHECKSUM/${CHECKSUM}/g" fmr-homebrew-template.rb

          # Copy the replaced template
          cp -f fmr-homebrew-template.rb homebrew-tap/Formula/fmr.rb
      
      - name: Push Homebrew Tap
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cd homebrew-tap
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add .
          git commit -m "Automated fmr Release ${TAG_NAME}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
